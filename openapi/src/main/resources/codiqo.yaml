        complexityMultiplier:
          $ref: '#/components/schemas/ComplexityMultiplierModel'
        baseEffortScore:
          type: number
          format: double
          minimum: 0
          maximum: 100

              
    VolumeScoreModel:
      type: object
      description: |
        Volume-based effort score calculation.
        NOTE: Files touched is intentionally excluded - code units (methods, classes) 
        provide better granularity for productivity measurement.
      properties:
        linesChanged:
          type: integer
          minimum: 0
          description: Total lines of code changed in the commit
        linesPoints:
          type: number
          format: double
          description: Points earned from lines changed (with relative scaling)
        methodsModified:
          type: integer
          minimum: 0
          description: Number of existing methods modified
        methodsModifiedPoints:
          type: number
          format: double
          description: Points for modifying methods (with complexity multiplier)
        methodsAdded:
          type: integer
          minimum: 0
          description: Number of new methods added
        methodsAddedPoints:
          type: number
          format: double
          description: Points for adding methods (with clean code bonus)
        classesModified:
          type: integer
          minimum: 0
          description: Number of existing classes modified
        classesModifiedPoints:
          type: number
          format: double
          description: Points for modifying classes
        classesAdded:
          type: integer
          minimum: 0
          description: Number of new classes added
        classesAddedPoints:
          type: number
          format: double
          description: Points for adding classes
        projectSizeFactor:
          type: number
          format: double
          description: |
            Cube root normalization factor based on project size.
            Used for relative scoring: cbrt(project_total_lines) / 100
        modifyMultiplier:
          type: number
          format: double
          description: |
            Multiplier for modification operations.
            Slightly higher for larger projects (harder to navigate).
            Formula: 1.0 + min(projectSizeFactor * 0.3, 0.2)
        addMultiplier:
          type: number
          format: double
          description: |
            Multiplier for addition operations.
            Contribution is more significant in smaller codebases.
            Formula: 1.0 + (0.1 / (1.0 + projectSizeFactor))
        totalVolumeScore:
          type: number
          format: double
          description: Final volume score (sum of all component scores, capped at max)

