openapi: 3.0.3
info:
  title: Codiqo API
  description: |
    API for code commit analysis optimized for LLM-based risk assessment and automated fixes.
    
    ## Purpose
    - Calculate commit risk/complexity scores based on code changes and their impact
    - Provide caller information for blast radius analysis
    - Enable automated PR suggestions via LLM + JDTLS integration
    - Detect code duplication (copy-paste detection)
    - Index codebase for cross-reference analysis
    
    ## Key Concepts
    - **Affected Code Units**: Methods/constructors changed in a commit
    - **Callers**: Who calls the affected code (impact/blast radius)
    - **Diagnostics**: Static analysis issues in affected code
    - **Coverage**: Test coverage of affected code
    - **Duplication**: Copy-paste detection results
    - **Codebase Index**: Full codebase symbol index for CPD resolution
    
    ## Risk Scoring Factors
    - Number of callers (blast radius)
    - Complexity metrics (cyclomatic, cognitive)
    - Test coverage of affected code
    - Static analysis violations
    - Whether callers are in test vs production code
    - Code duplication percentage
    
    ## LLM Scoring
    - LLM makes 100% judgment (0-100 score)
    - DIFF is the primary signal, not container metrics
    - Bugs classified as BLOCKING/MAJOR/MINOR
    - Quality assessment: NEW code clean, MODIFY improves
  version: 1.0
  contact:
    name: Codiqo
    url: https://codiqo.io

servers:
  - url: https://api.codiqo.io
    description: Production

tags:
  - name: Analysis
    description: Commit analysis and risk scoring

paths:
  /api/v1/analyses:
    post:
      operationId: submitAnalysis
      tags: [Analysis]
      summary: Submit commit analysis for risk scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisSubmissionModel'
      responses:
        '202':
          description: Analysis accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisAcceptedModel'
        '400':
          $ref: '#/components/responses/BadRequest'
      security:
        - apiKey: []

  /api/v1/analyses/{analysisId}:
    get:
      operationId: getAnalysis
      tags: [Analysis]
      summary: Get analysis result with risk score
      parameters:
        - name: analysisId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResultModel'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - apiKey: []

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'

  schemas:
    # ==========================================================================
    # Main Request/Response
    # ==========================================================================

    AnalysisSubmissionModel:
      type: object
      required: [project, commit, files]
      properties:
        project:
          $ref: '#/components/schemas/ProjectModel'
        commit:
          $ref: '#/components/schemas/CommitModel'
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileChangeModel'
        dependencies:
          $ref: '#/components/schemas/DependencyRegistryModel'
        duplication:
          $ref: '#/components/schemas/DuplicationReportModel'
        index:
          $ref: '#/components/schemas/CodebaseIndexModel'
        client:
          $ref: '#/components/schemas/ClientInfoModel'
        existingTags:
          $ref: '#/components/schemas/ExistingTagsModel'
        projectMetrics:
          $ref: '#/components/schemas/ProjectMetricsModel'
        projectQuality:
          $ref: '#/components/schemas/ProjectQualityModel'
        fullProjectCoverage:
          $ref: '#/components/schemas/FullProjectCoverageModel'

    AnalysisAcceptedModel:
      type: object
      required: [analysisId, status]
      properties:
        analysisId:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted, processing]
        estimatedCompletionSeconds:
          type: integer
          minimum: 0
        links:
          type: object
          properties:
            self:
              type: string
              format: uri
            status:
              type: string
              format: uri

    AnalysisResultModel:
      type: object
      required: [analysisId, project, commit, riskScore]
      properties:
        analysisId:
          type: string
          format: uuid
        project:
          $ref: '#/components/schemas/ProjectModel'
        commit:
          $ref: '#/components/schemas/CommitModel'
        status:
          type: string
          enum: [pending, processing, completed, failed]
        riskScore:
          $ref: '#/components/schemas/RiskScoreModel'
        summary:
          $ref: '#/components/schemas/AnalysisSummaryModel'
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileChangeModel'
        dependencies:
          $ref: '#/components/schemas/DependencyRegistryModel'
        duplication:
          $ref: '#/components/schemas/DuplicationReportModel'
        completedAt:
          type: string
          format: date-time
        changeClassification:
          type: string
          enum: [trivial, low_risk, moderate_risk, high_risk, critical_risk]
          description: LLM classification of the change type
        bugs:
          $ref: '#/components/schemas/BugsModel'
        assessment:
          $ref: '#/components/schemas/AssessmentModel'
        requiresSeniorReview:
          type: integer
          minimum: 0
          maximum: 10
          description: |
            0 = No review needed
            1-3 = Optional peer review
            4-6 = Recommended review
            7-8 = Senior review recommended
            9-10 = Critical review required
        seniorReviewReasons:
          type: array
          items:
            type: string
        tags:
          $ref: '#/components/schemas/ReviewTagsModel'
        projectMetrics:
          $ref: '#/components/schemas/ProjectMetricsModel'
        projectQuality:
          $ref: '#/components/schemas/ProjectQualityModel'
        fullProjectCoverage:
          $ref: '#/components/schemas/FullProjectCoverageModel'

    # ==========================================================================
    # Project Metrics & Quality (Global Level)
    # ==========================================================================

    ProjectMetricsModel:
      type: object
      description: |
        Global project-level metrics aggregated across all modules.
        Provides context for LLM scoring relative to project size.
      properties:
        totalLines:
          type: integer
          minimum: 0
          description: Total lines of code across all modules in the project
        totalFiles:
          type: integer
          minimum: 0
          description: Total number of source files in the project
        totalMethods:
          type: integer
          minimum: 0
          description: Total number of methods across all modules
        totalClasses:
          type: integer
          minimum: 0
          description: Total number of classes across all modules
        averageComplexity:
          type: number
          format: double
          minimum: 0
          description: Average cyclomatic complexity across all methods
        averageCoverage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Average test coverage percentage across all code

    ProjectQualityModel:
      type: object
      description: |
        Global project-level quality metrics for the commit.
        Aggregated across all changed files and modules.
      properties:
        totalPmdViolations:
          type: integer
          minimum: 0
          description: Total PMD violations across all changed files
        totalSpotbugsIssues:
          type: integer
          minimum: 0
          description: Total SpotBugs issues across all changed files
        averageCoverage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Average coverage percentage across all changed code units
        cpdDuplicationPercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: CPD duplication percentage across all changed files
        filesChanged:
          type: integer
          minimum: 0
          description: Number of files changed in this commit
        codeUnitsAffected:
          type: integer
          minimum: 0
          description: Number of code units (methods/constructors) affected
        averageComplexity:
          type: number
          format: double
          minimum: 0
          description: Average complexity of changed code units

    # ==========================================================================
    # Full Project Coverage (All Code Units)
    # ==========================================================================

    FullProjectCoverageModel:
      type: object
      description: |
        Complete coverage metrics for ALL code units in the project,
        not just commit-affected ones. Provides baseline for coverage gates.
      properties:
        totalMethods:
          type: integer
          minimum: 0
          description: Total methods/constructors in the project
        coveredMethods:
          type: integer
          minimum: 0
          description: Methods with at least partial coverage
        uncoveredMethods:
          type: integer
          minimum: 0
          description: Methods with zero coverage
        totalExecutableLines:
          type: integer
          minimum: 0
          description: Total executable lines across all methods
        coveredLines:
          type: integer
          minimum: 0
          description: Lines that are covered (full or partial)
        missedLines:
          type: integer
          minimum: 0
          description: Lines that are not covered
        totalBranches:
          type: integer
          minimum: 0
          description: Total branches across all methods
        coveredBranches:
          type: integer
          minimum: 0
          description: Branches that are covered
        missedBranches:
          type: integer
          minimum: 0
          description: Branches that are not covered
        linePercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Line coverage percentage
        branchPercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Branch coverage percentage
        byModule:
          type: object
          description: Per-module coverage breakdown
          additionalProperties:
            $ref: '#/components/schemas/ModuleFullCoverageModel'

    ModuleFullCoverageModel:
      type: object
      description: Full coverage metrics for a single module
      properties:
        moduleId:
          type: string
          description: Module identifier
        totalMethods:
          type: integer
          minimum: 0
          description: Total methods in this module
        coveredMethods:
          type: integer
          minimum: 0
          description: Methods with coverage in this module
        uncoveredMethods:
          type: integer
          minimum: 0
          description: Methods without coverage in this module
        totalExecutableLines:
          type: integer
          minimum: 0
          description: Total executable lines in this module
        coveredLines:
          type: integer
          minimum: 0
          description: Covered lines in this module
        missedLines:
          type: integer
          minimum: 0
          description: Missed lines in this module
        totalBranches:
          type: integer
          minimum: 0
          description: Total branches in this module
        coveredBranches:
          type: integer
          minimum: 0
          description: Covered branches in this module
        missedBranches:
          type: integer
          minimum: 0
          description: Missed branches in this module
        linePercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Line coverage percentage for this module
        branchPercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Branch coverage percentage for this module

    # ==========================================================================
    # Module Quality (Per-Module Level)
    # ==========================================================================

    ModuleQualityModel:
      type: object
      description: |
        Per-module quality metrics.
        Each maven/gradle module has its own quality metrics that aggregate
        to the global project quality.

        NOTE: Fields without "InModule" suffix are commit-affected metrics (changed code only).
        Fields with "InModule" suffix are full module metrics (all code).
      properties:
        totalLines:
          type: integer
          minimum: 0
          description: Total lines of code in this module's changed files (commit-affected only)
        totalMethods:
          type: integer
          minimum: 0
          description: Total methods in this module's changed files (commit-affected only)
        filesChanged:
          type: integer
          minimum: 0
          description: Number of files changed in this module (commit-affected)
        codeUnitsAffected:
          type: integer
          minimum: 0
          description: Number of code units affected in this module (commit-affected)
        pmdViolations:
          type: integer
          minimum: 0
          description: PMD violations in this module's changed code (commit-affected only)
        spotbugsIssues:
          type: integer
          minimum: 0
          description: SpotBugs issues in this module's changed code (commit-affected only)
        totalPmdViolationsInModule:
          type: integer
          minimum: 0
          description: Total PMD violations across ALL code in this module (not just changed)
        totalSpotbugsIssuesInModule:
          type: integer
          minimum: 0
          description: Total SpotBugs issues across ALL code in this module (not just changed)
        averageCoverage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Average coverage percentage for this module's changed code (commit-affected only)
        averageComplexity:
          type: number
          format: double
          minimum: 0
          description: Average cyclomatic complexity for this module's changed code (commit-affected only)
        cpdDuplicationPercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: CPD duplication percentage for this module
        totalMethodsInModule:
          type: integer
          minimum: 0
          description: Total methods in the entire module (not just changed)
        totalLinesInModule:
          type: integer
          minimum: 0
          description: Total lines of code in the entire module (not just changed)
        fullCoverage:
          $ref: '#/components/schemas/ModuleFullCoverageModel'

    # ==========================================================================
    # Dependencies - Top-level shared registry
    # ==========================================================================

    DependencyRegistryModel:
      type: object
      description: |
        Centralized dependency registry shared across all modules.
        Dependencies are stored once and referenced by ID from modules.
        Supports multiple ecosystems: Maven, NPM, PyPI, Go modules, Cargo, etc.
      properties:
        artifacts:
          type: object
          description: |
            Map of artifact ID to dependency details.
            Key format varies by ecosystem:
            - Maven: "groupId:artifactId:version" (e.g., "org.springframework:spring-core:6.1.0")
            - NPM: "package@version" (e.g., "lodash@4.17.21")
            - PyPI: "package==version" (e.g., "requests==2.31.0")
            - Go: "module@version" (e.g., "github.com/gin-gonic/gin@v1.9.1")
            - Cargo: "crate:version" (e.g., "serde:1.0.193")
          additionalProperties:
            $ref: '#/components/schemas/DependencyModel'

    DependencyModel:
      type: object
      description: |
        Abstract dependency model supporting multiple package ecosystems.
        Common fields work across ecosystems; ecosystem-specific details in dedicated objects.
      properties:
        name:
          type: string
        version:
          type: string
        ecosystem:
          type: string
          enum: [maven, npm, pypi, go, cargo, nuget, other]
        scope:
          type: string
        optional:
          type: boolean
          default: false
        transitive:
          type: boolean
          default: false
        snapshot:
          type: boolean
          default: false
        release:
          type: boolean
          default: false
        directDependants:
          type: array
          items:
            type: string
        licenses:
          type: array
          items:
            type: string
        repositoryUrl:
          type: string
          format: uri
        homepage:
          type: string
          format: uri
        maven:
          $ref: '#/components/schemas/MavenDependencyModel'
        npm:
          $ref: '#/components/schemas/NpmDependencyModel'
        pypi:
          $ref: '#/components/schemas/PypiDependencyModel'
        go:
          $ref: '#/components/schemas/GoDependencyModel'
        cargo:
          $ref: '#/components/schemas/CargoDependencyModel'

    MavenDependencyModel:
      type: object
      properties:
        groupId:
          type: string
        artifactId:
          type: string
        classifier:
          type: string
        type:
          type: string
          default: jar
        exclusions:
          type: array
          items:
            type: object
            properties:
              groupId:
                type: string
              artifactId:
                type: string

    NpmDependencyModel:
      type: object
      properties:
        resolved:
          type: string
          format: uri
        integrity:
          type: string
        peerDependenciesMeta:
          type: object
          additionalProperties:
            type: object
            properties:
              optional:
                type: boolean
        engines:
          type: object
          additionalProperties:
            type: string
        bundled:
          type: boolean

    PypiDependencyModel:
      type: object
      properties:
        extras:
          type: array
          items:
            type: string
        markers:
          type: string
        requiresPython:
          type: string
        wheel:
          type: boolean
        editable:
          type: boolean

    GoDependencyModel:
      type: object
      properties:
        module:
          type: string
        replace:
          type: string
        retract:
          type: array
          items:
            type: string
        indirect:
          type: boolean

    CargoDependencyModel:
      type: object
      properties:
        crate:
          type: string
        features:
          type: array
          items:
            type: string
        defaultFeatures:
          type: boolean
          default: true
        registry:
          type: string
        path:
          type: string
        git:
          type: string
          format: uri
        branch:
          type: string

    # ==========================================================================
    # Risk Score
    # ==========================================================================

    RiskScoreModel:
      type: object
      properties:
        overall:
          type: number
          format: double
          minimum: 0
          maximum: 100
        grade:
          type: string
          enum: [A, B, C, D, F]
        factors:
          $ref: '#/components/schemas/RiskFactorsModel'
        summary:
          type: string

    RiskFactorsModel:
      type: object
      properties:
        blastRadius:
          type: integer
          minimum: 0
        productionCallers:
          type: integer
          minimum: 0
        testCallers:
          type: integer
          minimum: 0
        avgComplexity:
          type: number
          format: double
        maxComplexity:
          type: integer
        uncoveredChanges:
          type: integer
        coveragePercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
        diagnosticCount:
          type: integer
        criticalDiagnostics:
          type: integer
        duplicatedPercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100

    # ==========================================================================
    # Analysis Summary
    # ==========================================================================

    AnalysisSummaryModel:
      type: object
      properties:
        filesChanged:
          type: integer
          minimum: 0
        filesAnalyzed:
          type: integer
          minimum: 0
        codeUnitsAnalyzed:
          type: integer
          minimum: 0
        diagnostics:
          $ref: '#/components/schemas/DiagnosticSummaryModel'
        coverage:
          $ref: '#/components/schemas/CoverageSummaryModel'
        duplication:
          $ref: '#/components/schemas/DuplicationSummaryModel'
        quality:
          $ref: '#/components/schemas/QualitySummaryModel'

    DiagnosticSummaryModel:
      type: object
      properties:
        total:
          type: integer
          minimum: 0
        byLevel:
          type: object
          properties:
            error:
              type: integer
              minimum: 0
            warning:
              type: integer
              minimum: 0
            info:
              type: integer
              minimum: 0
        byTool:
          type: object
          additionalProperties:
            type: integer

    CoverageSummaryModel:
      type: object
      properties:
        line:
          $ref: '#/components/schemas/CoverageCounterModel'
        branch:
          $ref: '#/components/schemas/CoverageCounterModel'
        delta:
          type: object
          properties:
            line:
              type: number
              format: double
            branch:
              type: number
              format: double

    DuplicationSummaryModel:
      type: object
      properties:
        totalDuplicatedTokens:
          type: integer
          minimum: 0
        totalDuplicatedLines:
          type: integer
          minimum: 0
        duplicatedPercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100

    QualitySummaryModel:
      type: object
      properties:
        score:
          type: number
          format: double
          minimum: 0
          maximum: 100
        grade:
          type: string
          enum: [A, B, C, D, E, F]
        passed:
          type: boolean

    # ==========================================================================
    # Project & Commit
    # ==========================================================================

    ProjectModel:
      type: object
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string
        repositoryUrls:
          type: array
          items:
            type: string
            format: uri
        defaultBranch:
          type: string
          default: main
        modules:
          type: array
          items:
            $ref: '#/components/schemas/ModuleModel'
        totalLines:
          type: integer
          description: Total lines of code in the entire project
        totalFiles:
          type: integer
          description: Total number of source files
        totalMethods:
          type: integer
          description: Total number of methods

    ModuleModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        baseDirectory:
          type: string
        sourceRoots:
          type: array
          items:
            type: string
        testSourceRoots:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
        quality:
          $ref: '#/components/schemas/ModuleQualityModel'
        maven:
          $ref: '#/components/schemas/MavenModuleModel'
        npm:
          $ref: '#/components/schemas/NpmModuleModel'
        python:
          $ref: '#/components/schemas/PythonModuleModel'

    MavenModuleModel:
      type: object
      properties:
        groupId:
          type: string
        artifactId:
          type: string
        version:
          type: string
        packaging:
          type: string
          default: jar
        parent:
          type: string

    NpmModuleModel:
      type: object
      properties:
        packageName:
          type: string
        version:
          type: string
        private:
          type: boolean
        workspaces:
          type: array
          items:
            type: string

    PythonModuleModel:
      type: object
      properties:
        packageName:
          type: string
        version:
          type: string
        pythonVersion:
          type: string
        buildBackend:
          type: string

    CommitModel:
      type: object
      required: [sha]
      properties:
        sha:
          type: string
          pattern: '^[a-f0-9]{40}$'
        message:
          type: string
        author:
          type: string
        authorEmail:
          type: string
          format: email
        timestamp:
          type: string
          format: date-time
        parents:
          type: array
          items:
            type: string
        branches:
          type: array
          items:
            type: string
        isMerge:
          type: boolean
          default: false

    ClientInfoModel:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        buildTool:
          type: string
          enum: [maven, gradle, npm, yarn, pnpm, pip, poetry, cargo, go, other]

    # ==========================================================================
    # File Changes
    # ==========================================================================

    FileChangeModel:
      type: object
      required: [path, changeType]
      properties:
        path:
          type: string
        previousPath:
          type: string
        changeType:
          type: string
          enum: [add, modify, delete, rename, copy]
        language:
          type: string
          enum: [java, kotlin, python, typescript, javascript, go, rust, other]
        isTest:
          type: boolean
          default: false
        module:
          type: string
        diff:
          type: string
        contentBefore:
          type: string
        contentAfter:
          type: string
        codeUnits:
          type: array
          items:
            $ref: '#/components/schemas/CodeUnitModel'
        metrics:
          $ref: '#/components/schemas/FileMetricsModel'
        qualityGrade:
          type: string
          enum: [A, B, C, D, E, F]

    FileMetricsModel:
      type: object
      properties:
        linesOfCode:
          type: integer
          minimum: 0
        sourceLines:
          type: integer
          minimum: 0
        blankLines:
          type: integer
          minimum: 0
        commentLines:
          type: integer
          minimum: 0
        codeUnits:
          type: integer
          minimum: 0
        classes:
          type: integer
          minimum: 0
        averageComplexity:
          type: number
          format: double

    # ==========================================================================
    # Code Units
    # ==========================================================================

    CodeUnitModel:
      type: object
      required: [signature, name, kind, location]
      properties:
        signature:
          type: string
        name:
          type: string
        kind:
          $ref: '#/components/schemas/SymbolKindModel'
        location:
          $ref: '#/components/schemas/LocationModel'
        body:
          type: string
        modifiers:
          type: array
          items:
            type: string
        documentation:
          type: string
        isTrivial:
          type: boolean
          default: false
        parent:
          type: string
        children:
          type: array
          items:
            type: string
        java:
          $ref: '#/components/schemas/JavaInfoModel'
        callers:
          type: array
          items:
            $ref: '#/components/schemas/CallerModel'
        metrics:
          $ref: '#/components/schemas/MetricsModel'
        coverage:
          $ref: '#/components/schemas/CoverageModel'
        diagnostics:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticModel'
        operation:
          type: string
          enum: [NEW, MODIFY, DELETE]
          description: What happened to this code unit
        bodyBefore:
          type: string
          description: Source code before change (for MODIFY)
        unitDiff:
          type: string
          description: Diff of just this code unit
        duplication:
          $ref: '#/components/schemas/CodeUnitDuplicationModel'

    SymbolKindModel:
      type: string
      enum:
        - class
        - interface
        - enum
        - record
        - method
        - constructor
        - field
        - constant
        - function
        - module
        - annotation
        - trait
        - lambda
        - closure

    LocationModel:
      type: object
      required: [startLine, endLine]
      properties:
        startLine:
          type: integer
          minimum: 1
        startColumn:
          type: integer
          minimum: 0
