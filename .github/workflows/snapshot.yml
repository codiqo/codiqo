name: Deploy SNAPSHOT to Central

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify version is a SNAPSHOT
        run: |
          VERSION=$(./mvnw -B -ntp -q -pl . -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec 2>/dev/null || mvn -B -ntp -q -pl . -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          echo "Detected version: $VERSION"
          case "$VERSION" in
            *-SNAPSHOT) echo "OK";;
            *) echo "Refusing to publish non-SNAPSHOT version from main: $VERSION"; exit 1;;
          esac

      - name: Deploy SNAPSHOT
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -Prelease clean deploy -DskipTests
